# ======================================================================
#  recession-dashboard control panel
#  Everything tunable lives here. No thresholds/weights hardcoded in .py
# ======================================================================

fred:
  # Get a free key at https://fredaccount.stlouisfed.org/apikeys
  # Leave blank to read from the FRED_API_KEY environment variable instead.
  api_key: ""   # leave blank in the committed file; set in config.local.yaml (gitignored) or FRED_API_KEY env / CI secret
  start: "1990-01-01"

cache:
  daily_max_age_h: 12      # daily series: refetch at most twice a day
  monthly_max_age_h: 720   # monthly/quarterly series: ~30 days
  market_max_age_h: 12

# --- weights for the composite (must sum to 1.0) ---
#  v2: credit promoted to a first-class bucket so the "spark" (credit/labor)
#  is no longer diluted inside one mega-macro bucket. Valuation stays heavy
#  (it's the fuel); the regime map (not the blended score) is the headline.
#  Bands are RECALIBRATED for these weights by model/backtest.py.
weights:
  valuation: 0.30
  macro_labor: 0.40
  credit: 0.15
  sentiment: 0.15

# --- breadth: an indicator is "in the danger zone" above this stress score ---
breadth:
  danger_zone: 75

# --- staleness decay: a flagged-stale indicator keeps only this share of its
#     weight in its bucket mean (a frozen value shouldn't hold full sway) ---
staleness:
  stale_weight: 0.4

# --- historical data-revision policy ---------------------------------
#  The cache contains latest-vintage observations, not an ALFRED vintage database.
#  Backtests therefore enforce conservative availability lags for revision-prone
#  series and label the result revision-adjusted/date-causal, NOT vintage-exact.
#  `classification` is mandatory for every series used by model/indicators.py.
revisions_policy:
  enforced: true
  mode: conservative_release_lag
  vintage_exact: false
  note: "latest-vintage values with conservative availability lags; date-causal, not vintage-exact"
  series:
    T10Y3M:       {classification: revision_safe,       lag_months: 0}
    T10Y2Y:       {classification: revision_safe,       lag_months: 0}
    BAMLH0A0HYM2: {classification: revision_safe,       lag_months: 0}
    BAMLC0A0CM:   {classification: revision_safe,       lag_months: 0}
    SAHMREALTIME: {classification: revision_safe,       lag_months: 0}
    ICSA:         {classification: revision_prone,      lag_months: 1}
    CPILFESL:     {classification: revision_prone,      lag_months: 1}
    DCOILWTICO:   {classification: revision_safe,       lag_months: 0}
    DRTSCILM:     {classification: revision_prone,      lag_months: 3}
    DRCCLACBS:    {classification: revision_prone,      lag_months: 3}
    UMCSENT:      {classification: revision_prone,      lag_months: 1}
    PSAVERT:      {classification: revision_prone,      lag_months: 1}
    "^VIX":      {classification: revision_safe,       lag_months: 0}
    cape:         {classification: unavailable_vintage, lag_months: 1}
    buffett:      {classification: unavailable_vintage, lag_months: 3}

# --- absolute reference thresholds (used by signals.py trip-wires, NOT by
#     the percentile scorer, which is purely historical) ---
thresholds:
  buffett_indicator: {extreme: 200, high: 150, normal: 100}
  cape:              {extreme: 35,  high: 28,  normal: 22}
  yield_curve_3m10y: {inverted: 0.0, warning: 0.5}     # percent; below = stress
  hy_spread_bp:      {danger: 500, warning: 400}        # ICE BofA HY OAS, bp
  sahm:              {trigger: 0.50}
  vix:               {high: 28, extreme: 40}

# --- FRED series: id -> how the model treats it -----------------------
#  bucket:    valuation | macro_stress | sentiment
#  direction: 'high' = high readings are stressful (score = percentile)
#             'low'  = low/negative readings are stressful (score = 100-pctile)
#  v2 buckets: macro_labor (curve+labor+activity) | credit (spreads+lending) |
#  sentiment (surveys+vol). 2s10s -> context (confirmation-only; T10Y3M is the
#  core curve signal, so we don't double-count one curve factor in the score).
fred_series:
  T10Y3M:        {name: "3M-10Y spread",        bucket: macro_labor, direction: low}
  T10Y2Y:        {name: "2s10s spread",         bucket: context,     direction: low}
  BAMLH0A0HYM2:  {name: "High-yield OAS",        bucket: credit,      direction: high}
  BAMLC0A0CM:    {name: "IG credit spread",      bucket: credit,      direction: high}
  SAHMREALTIME:  {name: "Sahm Rule",             bucket: macro_labor, direction: high}
  ICSA:          {name: "Initial jobless claims", bucket: macro_labor, direction: high}
  CPILFESL:      {name: "Core CPI (YoY calc)",   bucket: macro_labor, direction: high, transform: yoy}
  DCOILWTICO:    {name: "WTI crude",             bucket: macro_labor, direction: high}
  DRTSCILM:      {name: "Bank lending standards", bucket: credit,     direction: high}
  DRCCLACBS:     {name: "Credit card delinquency", bucket: credit,    direction: high}
  UMCSENT:       {name: "U.Mich sentiment",      bucket: sentiment,    direction: low}
  PSAVERT:       {name: "Personal savings rate", bucket: sentiment,    direction: low}

# --- market tickers (Yahoo, keyless) ----------------------------------
#  role: context | stress | valuation_proxy
market_tickers:
  "^GSPC":     {name: "S&P 500",          bucket: context,    direction: high, role: index}
  "^VIX":      {name: "VIX",              bucket: sentiment,  direction: high}
  "^TNX":      {name: "10Y yield",        bucket: context,    direction: high}
  "DX-Y.NYB":  {name: "US Dollar Index",  bucket: context,    direction: high}
  "NVDA":      {name: "NVIDIA (AI proxy)", bucket: context,   direction: high}

# --- valuation (scraped, keyless) -------------------------------------
valuation:
  cape:    {name: "Shiller CAPE", bucket: valuation, direction: high, source: multpl}
  buffett: {name: "Buffett Indicator", bucket: valuation, direction: high, source: fred_computed}

# --- verdict bands, checked by model/backtest.py ----------------------
#  Revision-adjusted/date-causal rerun (1997-2021): >=65 caught the GFC with
#  9m lead, missed dot-com and COVID, and fired in 15.0% of benign months.
#  These are operating bands, not vintage-exact probability thresholds.
bands:
  composite:
    benign:   50     # below = no crisis signal
    watch:    58     # 50-58 = late-cycle watch
    warning:  65     # >=65 = operating warning zone
    acute:    72     # >=72 = broad acute stress
    # Revision-adjusted rerun (val .30 / macro-labor .40 / credit .15 / sent .15):
    #   >=60 caught dot-com (18m), GFC (16m), and COVID (6m) but had 29.6% benign FP.
    #   >=65 caught only GFC (9m), missed dot-com/COVID, and had 15.0% benign FP.
    #   The regime map and trip-wires, not this composite alone, are the headline.

# --- trip-wires: the "what would confirm the crash" checklist ---------
#  Each maps to a live indicator; `trips_when` + `level` define the trigger.
#  These convert a vague worry into specific, watchable lines.
#  floor = the "all-clear" baseline; gauge fill % = distance from floor toward trigger.
tripwires:
  - {name: "3M-10Y spread",    indicator: "3M-10Y spread",          trips_when: below, level: -0.50, floor: 3.0,     unit: "%", note: "deep curve inversion"}
  - {name: "Sahm Rule",        indicator: "Sahm Rule",              trips_when: above, level: 0.50,  floor: 0.0,     unit: "",  note: "recession in progress"}
  - {name: "HY credit spread", indicator: "High-yield OAS",         trips_when: above, level: 5.00,  floor: 2.0,     unit: "%", note: "credit stress (500bp)"}
  - {name: "Jobless claims",   indicator: "Initial jobless claims", trips_when: above, level: 300000, floor: 200000, unit: "",  note: "labor market cracking"}
  - {name: "VIX",              indicator: "VIX",                    trips_when: above, level: 28.0,  floor: 12.0,    unit: "",  note: "volatility regime break"}
  - {name: "Bank standards",   indicator: "Bank lending standards", trips_when: above, level: 20.0,  floor: 0.0,     unit: "%", note: "credit crunch tightening"}
