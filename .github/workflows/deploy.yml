name: build-and-deploy

# Rebuild + publish the dashboard: daily, on push to main, and on manual trigger.
on:
  schedule:
    - cron: "0 12 * * *"     # daily ~12:00 UTC (FRED/markets publish on a lag; daily is plenty)
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build dashboard
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # set this as a repo secret (Settings > Secrets > Actions)
        run: |
          python -m output.dashboard
          mkdir -p public
          cp output/dashboard.html public/index.html
          touch public/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          enablement: true        # auto-enable Pages (source = GitHub Actions) on first run
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
